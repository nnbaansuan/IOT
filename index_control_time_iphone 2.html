<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pharaoh's Matrix IoT Control</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    
    <style>
        :root {
            --matrix-green: #00ff41;
            --pharaoh-gold: #ffd700;
            --dark-bg: #0a0a0c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            /* ป้องกันการไฮไลท์สีฟ้าแปลกๆ เวลาใช้นิ้วจิ้มบน iPhone */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--dark-bg);
            color: var(--matrix-green);
            padding: 15px;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* เลื่อนหน้าจอลื่นขึ้นบน iOS */
            background-image: linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 215, 0, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--pharaoh-gold);
            padding: 15px;
            background: rgba(10, 10, 12, 0.85);
            box-shadow: 0 0 15px var(--pharaoh-gold);
        }

        header h1 {
            color: var(--pharaoh-gold);
            font-size: 1.6rem; /* ปรับขนาดให้พอดีจอ iPhone แนวตั้ง */
            text-shadow: 0 0 10px var(--pharaoh-gold), 0 0 20px var(--matrix-green);
            letter-spacing: 2px;
        }

        #ntp-clock {
            color: var(--matrix-green);
            font-size: 1.1rem;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Responsive Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .card {
            background: rgba(15, 15, 20, 0.9);
            border: 1px solid var(--matrix-green);
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
            border-radius: 4px;
        }

        .card.gold-border {
            border: 1px solid var(--pharaoh-gold);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        .card h2 {
            color: var(--pharaoh-gold);
            margin-bottom: 12px;
            border-bottom: 1px dashed var(--pharaoh-gold);
            padding-bottom: 5px;
            font-size: 1.1rem;
        }

        .data-display {
            font-size: 2.8rem;
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 10px var(--matrix-green);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 14px 10px; /* เพิ่มพื้นที่กด (Touch Target) สำหรับนิ้วมือ */
            background: transparent;
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            -webkit-appearance: none; /* ล้างสไตล์เริ่มต้นของ iPhone ปุ่มเหลี่ยมแบบคลาสสิก */
            border-radius: 4px;
            touch-action: manipulation; /* ลดเวลาหน่วงในการคลิกบน iOS */
        }

        button:hover, button:active { /* เพิ่ม :active สำหรับการกดบนจอสัมผัส */
            background: var(--matrix-green);
            color: var(--dark-bg);
            box-shadow: 0 0 10px var(--matrix-green);
        }

        button.btn-off:hover, button.btn-off:active {
            background: #ff3333;
            border-color: #ff3333;
            color: white;
            box-shadow: 0 0 10px #ff3333;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #555;
            margin-right: 8px;
        }

        .status-indicator.on {
            background-color: var(--matrix-green);
            box-shadow: 0 0 8px var(--matrix-green);
        }

        /* Timer UI & iOS Fixes */
        .timer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
        }

        .timer-row label {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap; /* รองรับเวลาจอแคบมากๆ */
        }

        input[type="time"] {
            background: #111;
            border: 1px solid var(--pharaoh-gold);
            color: var(--pharaoh-gold);
            padding: 6px;
            font-family: inherit;
            font-size: 16px; /* บังคับ 16px เพื่อไม่ให้ Safari บน iPhone ซูมหน้าจออัตโนมัติ */
            -webkit-appearance: none; /* ล้างสไตล์ลูกศรของ iOS */
            border-radius: 4px;
            min-height: 35px;
        }

        input[type="checkbox"] {
            accent-color: var(--matrix-green);
            transform: scale(1.3);
            margin-right: 5px;
            -webkit-appearance: checkbox; /* บังคับให้แสดงผล checkbox บน iOS */
        }

        #mqtt-status {
            text-align: center;
            padding: 12px;
            margin-top: 15px;
            border: 1px solid var(--matrix-green);
            background: rgba(0, 255, 65, 0.05);
            font-size: 0.8rem;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PHARAOH'S MATRIX DASHBOARD</h1>
        <div id="ntp-clock">TIME: LOADING...</div>
    </header>

    <div class="grid">
        <div class="card">
            <h2>𓋹 TEMPERATURE</h2>
            <div class="data-display" id="temp-val">--.-°C</div>
        </div>
        <div class="card">
            <h2>𓃠 HUMIDITY</h2>
            <div class="data-display" id="hum-val">--.-%</div>
        </div>
    </div>

    <div class="grid">
        <div class="card gold-border">
            <h2>𓆗 RELAY 1 CONTROL</h2>
            <div style="margin-bottom: 10px; font-size: 0.9rem;">STATUS: <span id="r1-status-dot" class="status-indicator"></span><span id="r1-status-text">UNKNOWN</span></div>
            <div class="btn-group">
                <button onclick="controlRelay('ccp/relay1/cmd', 'ON')">EXECUTE ON</button>
                <button class="btn-off" onclick="controlRelay('ccp/relay1/cmd', 'OFF')">HALT OFF</button>
            </div>
            
            <h3 style="color:var(--pharaoh-gold); font-size:0.85rem; margin-top:20px; margin-bottom:10px;">𓍝 SCHEDULE SLOTS</h3>
            <div class="timer-row">
                <label>S1: ON<input type="time" id="r1-on-1">OFF<input type="time" id="r1-off-1"></label>
                <input type="checkbox" id="r1-en-1">
            </div>
            <div class="timer-row">
                <label>S2: ON<input type="time" id="r1-on-2">OFF<input type="time" id="r1-off-2"></label>
                <input type="checkbox" id="r1-en-2">
            </div>
            <div class="timer-row">
                <label>S3: ON<input type="time" id="r1-on-3">OFF<input type="time" id="r1-off-3"></label>
                <input type="checkbox" id="r1-en-3">
            </div>
        </div>

        <div class="card gold-border">
            <h2>𓅃 RELAY 2 CONTROL</h2>
            <div style="margin-bottom: 10px; font-size: 0.9rem;">STATUS: <span id="r2-status-dot" class="status-indicator"></span><span id="r2-status-text">UNKNOWN</span></div>
            <div class="btn-group">
                <button onclick="controlRelay('ccp/relay2/cmd', 'ON')">EXECUTE ON</button>
                <button class="btn-off" onclick="controlRelay('ccp/relay2/cmd', 'OFF')">HALT OFF</button>
            </div>

            <h3 style="color:var(--pharaoh-gold); font-size:0.85rem; margin-top:20px; margin-bottom:10px;">𓍝 SCHEDULE SLOTS</h3>
            <div class="timer-row">
                <label>S1: ON<input type="time" id="r2-on-1">OFF<input type="time" id="r2-off-1"></label>
                <input type="checkbox" id="r2-en-1">
            </div>
            <div class="timer-row">
                <label>S2: ON<input type="time" id="r2-on-2">OFF<input type="time" id="r2-off-2"></label>
                <input type="checkbox" id="r2-en-2">
            </div>
            <div class="timer-row">
                <label>S3: ON<input type="time" id="r2-on-3">OFF<input type="time" id="r2-off-3"></label>
                <input type="checkbox" id="r2-en-3">
            </div>
        </div>
    </div>

    <div id="mqtt-status">SYSTEM STATUS: CONNECTING TO MATRIX NETWORK...</div>
</div>

<script>
    const BrokerHost = "broker.hivemq.com";
    const BrokerPort = 8884; 
    const ClientID = "PharaohWeb_" + Math.floor(Math.random() * 10000);
    
    const TOPIC_TEMP = "ccp/esp32/temperature";
    const TOPIC_HUM = "ccp/esp32/humidity";
    const TOPIC_RELAY1_CMD = "ccp/relay1/cmd";
    const TOPIC_RELAY2_CMD = "ccp/relay2/cmd";
    const TOPIC_RELAY1_STAT = "ccp/relay1/status";
    const TOPIC_RELAY2_STAT = "ccp/relay2/status";

    let mqttClient = new Paho.MQTT.Client(BrokerHost, BrokerPort, ClientID);

    mqttClient.onConnectionLost = function (responseObject) {
        document.getElementById("mqtt-status").innerText = "SYSTEM STATUS: DISCONNECTED! [" + responseObject.errorMessage + "]";
        document.getElementById("mqtt-status").style.color = "#ff3333";
        setTimeout(connectMQTT, 5000);
    };

    mqttClient.onMessageArrived = function (message) {
        const topic = message.destinationName;
        const payload = message.payloadString;

        if (topic === TOPIC_TEMP) {
            document.getElementById("temp-val").innerText = payload + "°C";
        } else if (topic === TOPIC_HUM) {
            document.getElementById("hum-val").innerText = payload + "%";
        } else if (topic === TOPIC_RELAY1_STAT) {
            updateRelayUI("r1", payload);
        } else if (topic === TOPIC_RELAY2_STAT) {
            updateRelayUI("r2", payload);
        }
    };

    function connectMQTT() {
        mqttClient.connect({
            onSuccess: function () {
                document.getElementById("mqtt-status").innerText = "SYSTEM STATUS: SECURE NETWORK ESTABLISHED TO HIVEMQ";
                document.getElementById("mqtt-status").style.color = "var(--matrix-green)";
                mqttClient.subscribe(TOPIC_TEMP);
                mqttClient.subscribe(TOPIC_HUM);
                mqttClient.subscribe(TOPIC_RELAY1_STAT);
                mqttClient.subscribe(TOPIC_RELAY2_STAT);
            },
            onFailure: function (err) {
                document.getElementById("mqtt-status").innerText = "CONNECTION FAILED. RETRYING...";
                setTimeout(connectMQTT, 5000);
            },
            useSSL: true
        });
    }

    function controlRelay(topic, cmd) {
        if (mqttClient.isConnected()) {
            let message = new Paho.MQTT.Message(cmd);
            message.destinationName = topic;
            message.retained = true;
            mqttClient.send(message);
        }
    }

    function updateRelayUI(relayPrefix, status) {
        const dot = document.getElementById(relayPrefix + "-status-dot");
        const text = document.getElementById(relayPrefix + "-status-text");
        text.innerText = status;
        if (status === "ON") {
            dot.classList.add("on");
            text.style.color = "var(--matrix-green)";
        } else {
            dot.classList.remove("on");
            text.style.color = "#ff3333";
        }
    }

    function updateClockAndCheckTimers() {
        const now = new Date();
        const timeString = now.toTimeString().split(' ')[0]; 
        document.getElementById("ntp-clock").innerText = "TIME: " + timeString;

        const currentSeconds = now.getSeconds();

        if (currentSeconds === 0) {
            checkRelayTimer("r1", TOPIC_RELAY1_CMD);
            checkRelayTimer("r2", TOPIC_RELAY2_CMD);
        }
    }

    function checkRelayTimer(relayPrefix, cmdTopic) {
        const now = new Date();
        const currentHM = now.toTimeString().split(' ')[0].substring(0, 5);

        for (let i = 1; i <= 3; i++) {
            const isEnabled = document.getElementById(`${relayPrefix}-en-${i}`).checked;
            if (!isEnabled) continue;

            const onTime = document.getElementById(`${relayPrefix}-on-${i}`).value;
            const offTime = document.getElementById(`${relayPrefix}-off-${i}`).value;

            if (currentHM === onTime) {
                controlRelay(cmdTopic, "ON");
            } else if (currentHM === offTime) {
                controlRelay(cmdTopic, "OFF");
            }
        }
    }

    connectMQTT();
    setInterval(updateClockAndCheckTimers, 1000);
</script>
</body>
</html>
