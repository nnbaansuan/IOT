<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pharaoh Command Center</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js" type="text/javascript"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8413;
            --egyptian-blue: #102a45;
            --glass-bg: rgba(16, 20, 30, 0.75);
            --border-gold: 2px solid #d4af37;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-image: url('egyptian-hieroglyphs-wall.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            padding: 15px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Container Wrapper */
        .container {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Hieroglyphic Matrix Header */
        .header-panel {
            background: var(--glass-bg);
            border: var(--border-gold);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(8px);
        }

        .header-panel h1 {
            color: var(--gold);
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }

        .ntp-time {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        .connection-status {
            font-size: 0.8rem;
            margin-top: 5px;
            color: #ff4d4d;
        }
        .connection-status.connected {
            color: #4def8e;
        }

        /* Telemetry Cards */
        .sensor-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .sensor-card {
            background: var(--glass-bg);
            border: var(--border-gold);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .sensor-card i {
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .sensor-label {
            font-size: 0.85rem;
            color: #ccc;
            text-transform: uppercase;
        }

        .sensor-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 5px;
            color: #fff;
        }

        /* Control & Timer Panels */
        .panel {
            background: var(--glass-bg);
            border: var(--border-gold);
            border-radius: 12px;
            padding: 15px;
            backdrop-filter: blur(8px);
        }

        .panel-title {
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Slide Switch Style */
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(215, 175, 55, 0.2);
        }
        .control-row:last-child {
            border-bottom: none;
        }

        .relay-info h3 {
            font-size: 1rem;
        }
        .relay-status-text {
            font-size: 0.8rem;
            color: #aaa;
        }

        /* iOS Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
            border: 1px solid var(--gold);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 3px;
            bottom: 3px;
            background-color: var(--gold);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--egyptian-blue);
            box-shadow: 0 0 10px rgba(214, 175, 55, 0.6);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
            background-color: #fff;
        }

        /* Timer Sub-sections */
        .timer-section {
            margin-bottom: 15px;
        }
        .timer-section:last-child {
            margin-bottom: 0;
        }
        .timer-sub-title {
            font-size: 0.95rem;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .timer-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .timer-slot {
            display: grid;
            grid-template-columns: auto 1fr 1fr;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 6px;
        }

        .timer-slot span {
            font-size: 0.8rem;
            color: #ddd;
            width: 20px;
        }

        .timer-slot input[type="time"] {
            background: #222;
            border: 1px solid var(--gold);
            color: #fff;
            padding: 4px;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-panel">
            <h1>PHARAOH CONTROL</h1>
            <div class="ntp-time" id="ntp-clock">00:00:00</div>
            <div class="connection-status" id="mqtt-status"><i class="fas fa-circle-notch fa-spin"></i> Connecting to Nile Broker...</div>
        </div>

        <div class="sensor-grid">
            <div class="sensor-card">
                <i class="fas fa-thermometer-half"></i>
                <div class="sensor-label">Temperature</div>
                <div class="sensor-value" id="temp-val">--.- °C</div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-tint"></i>
                <div class="sensor-label">Humidity</div>
                <div class="sensor-value" id="hum-val">--.- %</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title"><i class="fas fa-bolt"></i> Relay Command</div>
            
            <div class="control-row">
                <div class="relay-info">
                    <h3>Relay 1</h3>
                    <div class="relay-status-text" id="status-relay1">Status: Offline</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="cmd-relay1" onchange="toggleRelay(1, this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-row">
                <div class="relay-info">
                    <h3>Relay 2</h3>
                    <div class="relay-status-text" id="status-relay2">Status: Offline</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="cmd-relay2" onchange="toggleRelay(2, this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title"><i class="fas fa-hourglass-half"></i> Sacred Timers (3 Slots)</div>
            
            <div class="timer-section">
                <div class="timer-sub-title"><i class="fas fa-circle-notch"></i> Relay 1 Scheduler</div>
                <div class="timer-grid">
                    <div class="timer-slot"><span>1</span><input type="time" id="r1-on-1"> <input type="time" id="r1-off-1"></div>
                    <div class="timer-slot"><span>2</span><input type="time" id="r1-on-2"> <input type="time" id="r1-off-2"></div>
                    <div class="timer-slot"><span>3</span><input type="time" id="r1-on-3"> <input type="time" id="r1-off-3"></div>
                </div>
            </div>

            <div class="timer-section">
                <div class="timer-sub-title"><i class="fas fa-circle-notch"></i> Relay 2 Scheduler</div>
                <div class="timer-grid">
                    <div class="timer-slot"><span>1</span><input type="time" id="r2-on-1"> <input type="time" id="r2-off-1"></div>
                    <div class="timer-slot"><span>2</span><input type="time" id="r2-on-2"> <input type="time" id="r2-off-2"></div>
                    <div class="timer-slot"><span>3</span><input type="time" id="r2-on-3"> <input type="time" id="r2-off-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MQTT Configuration ---
        const BROKER = "broker.hivemq.com";
        const PORT = 8884; // Secure WebSockets
        const CLIENT_ID = "pharaoh_web_" + Math.random().toString(36).substr(2, 5);

        const TOPIC_TEMP = "ccp/esp32/temperature";
        const TOPIC_HUM = "ccp/esp32/humidity";
        const TOPIC_RELAY1_CMD = "ccp/relay1/cmd";
        const TOPIC_RELAY2_CMD = "ccp/relay2/cmd";
        const TOPIC_RELAY1_STATUS = "ccp/relay1/status";
        const TOPIC_RELAY2_STATUS = "ccp/relay2/status";

        let mqttClient = new Paho.MQTT.Client(BROKER, Number(PORT), CLIENT_ID
